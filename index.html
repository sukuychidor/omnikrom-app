<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnikrom Cotizador</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1c1c1c; color: white; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #2b2b2b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #0088cc; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>🚀 Cotización Omnikrom</h2>
    <div class="form-group">
        <label>Cliente:</label>
        <input type="text" id="cliente" placeholder="Nombre del cliente">
    </div>
    <div class="form-group">
        <label>Producto (SQL Data):</label>
        <select id="producto">
            <option value="Lona Front">Lona Front - 35 Bs/m2</option>
            <option value="Vinilo Adhesivo">Vinilo Adhesivo - 45 Bs/m2</option>
            <option value="Microperforado">Microperforado - 55 Bs/m2</option>
        </select>
    </div>
    <div class="form-group">
        <label>Cantidad:</label>
        <input type="number" id="cantidad" value="1">
    </div>
    <div class="form-group">
        <label>Observaciones:</label>
        <textarea id="obs" rows="3"></textarea>
    </div>
    <button onclick="enviarDatos()">GENERAR COTIZACIÓN</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Abre la app a pantalla completa

        function enviarDatos() {
            const data = {
                cliente: document.getElementById('cliente').value,
                producto: document.getElementById('producto').value,
                cantidad: document.getElementById('cantidad').value,
                obs: document.getElementById('obs').value
            };
            tg.sendData(JSON.stringify(data)); // Envía los datos al bot
            tg.close(); // Cierra la Web App
        }
    </script>
</body>
</html>
